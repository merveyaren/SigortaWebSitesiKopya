services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: insucom
      POSTGRES_USER: insucom
      POSTGRES_PASSWORD: insucom
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insucom -d insucom"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_demo_data &&
             exec gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-insucom}
      POSTGRES_USER: ${POSTGRES_USER:-insucom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insucom}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-docker-dev-not-for-production-use-long-secret-in-real-env-9f1a}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-bkm9Gq2Xv7Lr3Tn5Wp8Ys1Df6Hj4Kz0Q}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
